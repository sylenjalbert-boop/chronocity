<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chroniques des Tuiles</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep:      #0d0a07;
            --bg-panel:     #13100c;
            --bg-card:      #1c1712;
            --bg-hover:     #241e16;
            --border:       #3a2e1e;
            --border-gold:  #7a5c1e;
            --gold:         #c9922a;
            --gold-light:   #e8b84b;
            --gold-shine:   #f5d87a;
            --red:          #9b2020;
            --red-light:    #c93030;
            --teal:         #1a5a5a;
            --teal-light:   #2a8a8a;
            --text:         #d4c4a0;
            --text-muted:   #8a7a60;
            --text-bright:  #f0e0b0;
            --tile-fog:     #1e1a14;
            --tile-revealed:#0f1a10;
            --shadow:       0 4px 24px rgba(0,0,0,0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: 'Crimson Text', Georgia, serif;
            background: var(--bg-deep);
            color: var(--text);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(122,92,30,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(155,32,32,0.03) 0%, transparent 50%);
        }

        /* ──── GAME AREA ──── */
        #game-area {
            flex: 0 0 auto;
            display: grid;
            grid-template-columns: repeat(5, 90px);
            grid-template-rows: repeat(5, 90px);
            gap: 6px;
            padding: 20px;
            align-content: center;
            justify-content: center;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            position: relative;
        }

        #game-area::before {
            content: "CARTE D'EXPLORATION";
            position: absolute;
            top: 8px; left: 50%;
            transform: translateX(-50%);
            font-family: 'Cinzel', serif;
            font-size: 9px;
            letter-spacing: 3px;
            color: var(--text-muted);
        }

        .tile {
            background: var(--tile-fog);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            border: 1px solid var(--border);
            text-align: center;
            padding: 4px;
            color: var(--text-muted);
            transition: all 0.2s ease;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }

        .tile::before {
            content: '?';
            font-size: 22px;
            color: var(--border-gold);
            opacity: 0.5;
        }

        .tile:not(.revealed):not(.city):hover {
            border-color: var(--gold);
            background: var(--bg-hover);
            box-shadow: 0 0 10px rgba(201,146,42,0.2);
            transform: scale(1.04);
        }

        .tile.revealed {
            background: var(--tile-revealed);
            cursor: default;
            border-color: #2a3a2a;
            font-size: 10px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .tile.revealed::before { display: none; }

        .tile.city {
            background: linear-gradient(135deg, #1a1500, #2a1f00);
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(201,146,42,0.3);
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }
        .tile.city::before { display: none; }
        .tile.city img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
        .tile.city:hover { box-shadow: 0 0 20px rgba(201,146,42,0.5); transform: scale(1.04); }

        /* tile type colors */
        .tile.t-prairie  { color: #4a8a4a; border-color: #2a5a2a; }
        .tile.t-montagne { color: #8a7a6a; border-color: #5a4a3a; }
        .tile.t-forge    { color: #c05020; border-color: #803010; }
        .tile.t-lac      { color: #3a7a9a; border-color: #1a5a7a; }
        .tile.t-foret    { color: #2a7a2a; border-color: #1a5a1a; }
        .tile.t-gobelin  { color: var(--red-light); border-color: var(--red); }

        /* ──── SHOP AREA ──── */
        #shop-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            background: var(--bg-panel);
            gap: 10px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            min-width: 240px;
            max-width: 280px;
        }

        .shop-area-title {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .shop-list {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
        }

        .shop-list h3 {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }

        .shop-item {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        .shop-item span {
            font-size: 12px;
            color: var(--text);
            line-height: 1.3;
        }

        .shop-item button, #next-turn-btn {
            background: linear-gradient(135deg, #2a1f08, #1a1305);
            border: 1px solid var(--border-gold);
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            font-size: 10px;
            letter-spacing: 0.5px;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 3px;
            white-space: nowrap;
            transition: all 0.15s;
        }

        .shop-item button:hover, #next-turn-btn:hover {
            background: linear-gradient(135deg, #3d2e0e, #2a1f08);
            border-color: var(--gold-light);
            color: var(--gold-shine);
            box-shadow: 0 0 8px rgba(201,146,42,0.3);
        }

        #next-turn-btn {
            width: 100%;
            padding: 8px;
            font-size: 11px;
            letter-spacing: 1.5px;
        }

        /* ──── INFO PANEL ──── */
        #info-panel {
            flex: 0 0 200px;
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            background: var(--bg-panel);
            gap: 10px;
            overflow-y: auto;
        }

        .panel-title {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .info-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
        }

        .info-box h4 {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            color: var(--gold);
            letter-spacing: 1.5px;
            margin-bottom: 7px;
            text-transform: uppercase;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
            font-size: 12px;
            color: var(--text);
            border-bottom: 1px solid rgba(58,46,30,0.4);
        }
        .stat-row:last-child { border-bottom: none; }

        .stat-label { color: var(--text-muted); font-size: 11px; }

        .stat-value {
            font-family: 'Cinzel', serif;
            font-size: 12px;
            color: var(--gold-light);
            font-weight: 600;
        }

        .stat-bonus { color: #5ab05a; font-size: 10px; margin-left: 2px; }

        .horde-value { color: var(--red-light) !important; }

        /* ──── LOG ──── */
        #log-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        #log-box h4 {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            color: var(--gold);
            letter-spacing: 1.5px;
            margin-bottom: 7px;
            text-transform: uppercase;
        }

        #log-content {
            font-size: 11px;
            color: var(--text);
            overflow-y: auto;
            flex: 1;
            line-height: 1.6;
        }

        #log-content p {
            padding: 2px 0;
            border-bottom: 1px solid rgba(58,46,30,0.3);
        }
        #log-content p:last-child { border-bottom: none; }

        /* ──── COMBAT MODAL ──── */
        #combatModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .combat-container {
            background: linear-gradient(160deg, #1a1409, #0d0a05);
            border: 1px solid var(--border-gold);
            border-radius: 6px;
            padding: 24px;
            width: 680px;
            max-width: 95vw;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            box-shadow: 0 0 60px rgba(201,146,42,0.15), var(--shadow);
            position: relative;
        }

        .combat-container::before {
            content: '⚔ COMBAT ⚔';
            position: absolute;
            top: -12px; left: 50%;
            transform: translateX(-50%);
            background: var(--bg-deep);
            padding: 0 12px;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--gold);
        }

        .combatant {
            text-align: center;
            flex: 1;
        }

        .combatant img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            border: 2px solid var(--border);
            border-radius: 4px;
            display: block;
            margin: 0 auto 8px;
        }

        .combatant-name {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            color: var(--gold-light);
            margin-bottom: 4px;
        }

        .combatant-stats {
            font-size: 12px;
            color: var(--text-muted);
        }

        .damage-indicator {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: #ff4444;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,0,0,0.8);
            pointer-events: none;
            animation: showDamage 1.2s forwards;
        }

        @keyframes showDamage {
            0%   { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            50%  { opacity: 1; transform: translate(-50%, -80%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(0.8); }
        }

        .combat-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            flex: 0 0 auto;
        }

        .combat-actions button {
            background: linear-gradient(135deg, #2a1f08, #1a1305);
            border: 1px solid var(--border-gold);
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            font-size: 12px;
            letter-spacing: 1px;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 3px;
            width: 140px;
            transition: all 0.15s;
        }

        .combat-actions button:hover {
            background: linear-gradient(135deg, #3d2e0e, #2a1f08);
            box-shadow: 0 0 12px rgba(201,146,42,0.4);
            color: var(--gold-shine);
        }

        .combat-actions button.flee-btn {
            border-color: #5a3a3a;
            color: #c07070;
        }
        .combat-actions button.flee-btn:hover {
            border-color: var(--red-light);
            color: #ff8080;
            box-shadow: 0 0 10px rgba(155,32,32,0.4);
        }

        #combatLog {
            width: 140px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 11px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 6px;
            text-align: left;
        }

        #combatLog p { margin-bottom: 3px; line-height: 1.4; }

        /* ──── DEFEAT SCREEN ──── */
        #defeatScreen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .defeat-inner {
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

        #defeatScreen img {
            width: 50%;
            max-width: 500px;
            filter: drop-shadow(0 0 30px rgba(155,32,32,0.5));
        }

        .defeat-title {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: var(--red-light);
            letter-spacing: 4px;
            margin: 20px 0 10px;
            text-shadow: 0 0 20px rgba(200,50,50,0.5);
        }

        .defeat-sub {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        #defeatScreen button {
            background: linear-gradient(135deg, #3a0808, #1a0404);
            border: 1px solid var(--red);
            color: #ff9090;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 2px;
            padding: 12px 32px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }

        #defeatScreen button:hover {
            border-color: var(--red-light);
            box-shadow: 0 0 20px rgba(200,50,50,0.4);
        }

        /* ──── SCROLLBARS ──── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 2px; }

        /* ──── TURN BANNER ──── */
        .turn-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: var(--gold-light);
            background: rgba(13,10,7,0.9);
            border: 1px solid var(--border-gold);
            padding: 16px 36px;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(201,146,42,0.2);
            z-index: 50;
            animation: bannerAnim 2s forwards;
            pointer-events: none;
        }
        @keyframes bannerAnim {
            0%   { opacity:0; transform:translate(-50%,-60%); }
            20%  { opacity:1; transform:translate(-50%,-50%); }
            80%  { opacity:1; transform:translate(-50%,-50%); }
            100% { opacity:0; transform:translate(-50%,-40%); }
        }

        /* ──── CITY MODAL ──── */
        #cityModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .city-container {
            background: linear-gradient(160deg, #1a1409, #0d0a05);
            border: 1px solid var(--border-gold);
            border-radius: 6px;
            padding: 24px;
            min-width: 340px;
            box-shadow: 0 0 60px rgba(201,146,42,0.15);
            position: relative;
        }
        .city-container h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 14px;
            font-size: 1rem;
        }
        .city-container ul { list-style: none; padding: 0; }
        .city-container li {
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text);
        }
        .city-container li:last-child { border-bottom: none; }
        .city-close {
            background: none;
            border: 1px solid var(--border-gold);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            padding: 8px 20px;
            cursor: pointer;
            margin-top: 14px;
            border-radius: 3px;
            display: block;
            width: 100%;
            font-size: 11px;
            letter-spacing: 1px;
            transition: all 0.15s;
        }
        .city-close:hover { background: rgba(201,146,42,0.1); }

        /* ──── NOTIFICATION ──── */
        .notif {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            font-size: 12px;
            padding: 10px 18px;
            border-radius: 4px;
            z-index: 300;
            animation: notifAnim 3s forwards;
            pointer-events: none;
            max-width: 280px;
        }
        @keyframes notifAnim {
            0%   { opacity:0; transform:translateY(10px); }
            15%  { opacity:1; transform:translateY(0); }
            80%  { opacity:1; }
            100% { opacity:0; }
        }
    </style>
</head>
<body>

<!-- ══════════════ COMBAT MODAL ══════════════ -->
<div id="combatModal">
    <div class="combat-container">
        <div class="combatant" style="position:relative;">
            <img src="avatar_image.png" alt="Avatar">
            <div id="avatarDamageContainer"></div>
            <div class="combatant-name">Aventurier</div>
            <div class="combatant-stats" id="avatarStats">ATK: 3 | DEF: 3 | Bouclier: 0</div>
        </div>

        <div class="combat-actions">
            <button onclick="continueFight()">⚔ Combattre</button>
            <button onclick="useSkill()">✦ Compétence</button>
            <button class="flee-btn" onclick="fleeFight()">↩ Fuir</button>
            <div id="combatLog"></div>
        </div>

        <div class="combatant" style="position:relative;">
            <img src="goblin_image.png" alt="Gobelin">
            <div id="goblinDamageContainer"></div>
            <div class="combatant-name">Gobelins</div>
